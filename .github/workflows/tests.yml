name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auth_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Reset database
        run: npx prisma migrate reset --force
        env: 
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_test?schema=public


      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_test?schema=public
        run: npm run test:coverage

